name: Deploy Manager

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG=${{ github.sha }}
          IMAGE_NAME=ghcr.io/$REPO_OWNER/auto-sec-gateway/manager:$TAG
          
          cd manager
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Update Kubernetes manifest
        run: |
          TAG=${{ github.sha }}
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/$REPO_OWNER/auto-sec-gateway/manager:$TAG
          
          sed -i "s|image: ghcr.io.*manager:.*|image: $IMAGE_NAME|g" k8s/manager.yaml
          sed -i "s|image: registry.gitlab.com.*manager:.*|image: $IMAGE_NAME|g" k8s/manager.yaml

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update manager image to ${{ github.sha }} [skip ci]"
          file_pattern: 'k8s/manager.yaml'