stages:
  - build
  - update-manifest

variables:
  # Путь к образу в твоем реестре
  IMAGE_NAME: $CI_REGISTRY_IMAGE/manager
  # Уникальный тег на основе короткого хэша коммита
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# --- ЭТАП 1: СБОРКА И ПУШ ОБРАЗА ---
build-manager:
  stage: build
  image: docker:24.0.5 # Используем Docker для сборки
  services:
    - docker:24.0.5-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - cd manager
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG
  only:
    - main # Запускать только при пуше в основную ветку

# --- ЭТАП 2: ОБНОВЛЕНИЕ YAML И ГИТОПС ---
update-k8s-manifest:
  stage: update-manifest
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
    # Настройка git для пуша от имени системы
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "GitLab CI Bot"
  script:
    - sed -i "s|image: $CI_REGISTRY_IMAGE/manager:.*|image: $IMAGE_NAME:$IMAGE_TAG|g" k8s/manager.yaml
    
    # Пушим изменения обратно в репозиторий
    - git add k8s/manager.yaml
    # [skip ci] нужен, чтобы не вызвать бесконечный цикл запусков пайплайна
    - git commit -m "chore(ci):update manager image to $IMAGE_TAG [skip ci]"
    
    # Используем созданный ранее токен для пуша
    - git push https://oauth2:${CI_PUSH_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git HEAD:main
  only:
    - main
  needs:
    - build-manager