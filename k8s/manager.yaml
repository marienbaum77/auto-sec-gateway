apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
    spec:
      hostNetwork: true # Нужно, чтобы достучаться до 127.0.0.1:8443 (Xray)
      containers:
      - name: manager
        image: registry.gitlab.com/i.rusakov7887/auto-sec-gateway/manager:v1
        ports:
        - containerPort: 8080
        env:
        - name: PUBLIC_IP
          value: "158.160.40.150"
        - name: XRAY_ADDR
          value: "127.0.0.1:8443"
---
apiVersion: v1
kind: Service
metadata:
  name: manager-service
  namespace: prod
spec:
  selector:
    app: manager
  ports:
  - port: 80 # Порт, который будет слушать Сервис
    targetPort: 8080 # Порт твоей программы на Go