apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets-sync
  namespace: prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: yandex-lockbox-cluster
    kind: ClusterSecretStore
  target:
    name: app-secrets # Имя секрета в K8s остаётся прежним
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: e6q7s7jpppetoc7rdepk # ТВОЙ ID из скриншота (app-secrets-storage)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telegram-secret-sync
  namespace: prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: yandex-lockbox-cluster
    kind: ClusterSecretStore
  target:
    name: telegram-secret # Имя секрета в K8s остаётся прежним
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: e6quem1e4co96gvnmke5 # ТВОЙ ID из скриншота (telegram-bot-storage)