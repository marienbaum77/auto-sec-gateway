apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-sync
  namespace: prod # Здесь namespace НУЖЕН, так как секрет создается в комнате приложения
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: yandex-lockbox-cluster # ИМЯ ИЗ ФАЙЛА ВЫШЕ
    kind: ClusterSecretStore # ЯВНО УКАЗЫВАЕМ, ЧТО МАГАЗИН ГЛОБАЛЬНЫЙ
  target:
    name: app-secrets
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: app-secrets-storage
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-secret-sync
  namespace: prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: yandex-lockbox-cluster
    kind: ClusterSecretStore
  target:
    name: telegram-secret # ИМЯ СЕКРЕТА ДЛЯ БОТА
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: telegram-bot-storage