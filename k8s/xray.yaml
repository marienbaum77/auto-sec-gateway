apiVersion: v1
kind: ConfigMap
metadata:
  name: xray-config
  namespace: prod
data:
  config.json: |
    {
      "log": {"loglevel": "debug"},
      "inbounds": [{
        "port": 8443, 
        "protocol": "vless",
        "settings": {
          "clients": [{"id": "99c0b456-bd47-46d9-81a8-fc2920a7548a", "flow": "xtls-rprx-vision"}],
          "decryption": "none"
        },
        "streamSettings": {
          "network": "tcp",
          "security": "reality",
          "realitySettings": {
            "show": false,
            "dest": "www.microsoft.com:443",
            "xver": 0,
            "serverNames": ["www.microsoft.com"],
            "privateKey": "oCyvun1LfZPdMiHz-wTEoKfo5zk7u_FfOyeVztfQFUQ",
            "shortIds": ["abcdef12"]
          }
        }
      }],
      "outbounds": [{"protocol": "freedom"}]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray
  namespace: prod
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: xray
  template:
    metadata:
      labels:
        app: xray
    spec:
      hostNetwork: true
      containers:
      - name: xray
        image: teddysun/xray:latest
        ports:
        - containerPort: 8443
          hostPort: 8443
          protocol: TCP
        volumeMounts:
        - name: config-volume
          mountPath: /etc/xray
      volumes:
      - name: config-volume
        configMap:
          name: xray-config