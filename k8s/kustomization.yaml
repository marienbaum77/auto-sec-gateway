apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml    # Namespace prod до остальных ресурсов
  - ingress.yaml      # Твой прокси-шлюз с WAF
  - waf-config.yaml   # Глобальные настройки ModSecurity
  - xray.yaml         # Деплой Xray (сервер для проксирования трафика)
  - manager.yaml      # Деплой твоей программы на Go (менеджер)
  - postgres.yaml     # Деплой PostgreSQL для хранения данных
  - manager-config.yaml # ConfigMap с настройками для менеджера
  - secret-store.yaml # Store для хранения секретов
  - external-secrets.yaml # External Secrets для интеграции с Yandex Lockbox


configMapGenerator:
  - name: xray-template-cm
    namespace: prod
    files:
      - xray-config.template.json
